spring.application.name=user-service

server.port = 8081

spring.datasource.url = jdbc:mysql://localhost:3306/userdb
spring.datasource.username=root
spring.datasource.password=Yash@006

jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

management.endpoints.web.exposure.include= beans, mappings,	threaddump, session
management.endpoint.health.show-details=always


# The name of the log file
logging.file.name= C:\Log\elasticstack-user-service.log


# Set the logging level (Optional: DEBUG, INFO, WARN, ERROR)
logging.level.root=INFO
#logging.level.org.springframework.web=DEBUG

# Maximum size of a single log file before it rotates
logging.logback.rollingpolicy.max-file-size=10MB

# Total size of all log files to keep before deleting old ones
logging.logback.rollingpolicy.total-size-cap=100MB

# Number of days to keep archived log files
logging.logback.rollingpolicy.max-history=7